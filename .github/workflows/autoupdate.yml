name: autoupdate

on:
  schedule:
    - cron: '0 20 28 * *'
    - cron: '0 0 1 1 *'
  workflow_dispatch:

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: '3.14'

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          repository: coatl-dev/workflow-requirements
          path: deps

      - name: Update copyright year
        if: ${{ github.event.schedule == '0 0 1 1 *'}}
        run: |
          current_year=$(date +'%Y')

          echo "current_year: $current_year"

          sed -i "s/default: [0-9]\{4\}/default: $current_year/" copier.yml

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('deps/requirements/pre-commit.txt') }}

      - name: Install pre-commit
        run: |
          python -m pip install --requirement deps/requirements/pre-commit.txt

      - name: Install pylint
        run: |
          python -m pip install --requirement deps/requirements/pylint.txt

      - name: Update ignition
        run: |
          pre-commit autoupdate
        working-directory: ignition

      - name: Update jython
        run: |
          pre-commit autoupdate
          pylint --generate-rcfile > .pylintrc
        working-directory: jython

      - name: Update python
        run: |
          pre-commit autoupdate
          pylint --generate-rcfile > .pylintrc
        working-directory: python

      - name: Update reusable workflows
        run: |
          latest_workflows_tag="$(
            git ls-remote --tags --refs https://github.com/coatl-dev/workflows.git 'v*' \
              | awk -F/ '{ print $NF }' \
              | grep -E '^v[0-9]+$' \
              | sort -V \
              | tail -n 1
          )"

          if [ -z "$latest_workflows_tag" ]; then
            echo "Unable to determine the latest coatl-dev/workflows tag."
            exit 1
          fi

          echo "latest_workflows_tag: $latest_workflows_tag"

          find . -path '*/.github/workflows/*.jinja' -type f -print0 \
            | xargs -0 sed -i -E "s#(uses: coatl-dev/workflows/.github/workflows/[^[:space:]]+@)v[0-9]+#\1${latest_workflows_tag}#g"

      - name: Detect changes
        id: git-diff
        uses: coatl-dev/actions/simple-git-diff@v5

      - name: Import GPG key
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        id: gpg-import
        uses: coatl-dev/actions/gpg-import@v5
        with:
          passphrase: ${{ secrets.COATL_BOT_GPG_PASSPHRASE }}
          private-key: ${{ secrets.COATL_BOT_GPG_PRIVATE_KEY }}

      - name: Commit and push changes
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        run: |
          git checkout -B coatl-dev-autoupdate
          git add --update
          git commit -m 'refactor(templates): autoupdate'
          git push --force --set-upstream origin coatl-dev-autoupdate

      - name: Create Pull Request
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        uses: coatl-dev/actions/pr-create@v5
        with:
          gh-token: ${{ secrets.COATL_BOT_GH_TOKEN }}
