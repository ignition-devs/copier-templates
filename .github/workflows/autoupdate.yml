name: autoupdate

on:
  schedule:
    - cron: '0 20 28 * *'
    - cron: '0 0 1 1 *'
  workflow_dispatch:

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        id: setup-python
        with:
          python-version: '3.14'

      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: coatl-dev/workflow-requirements
          path: deps

      - name: Update copyright year
        if: ${{ github.event.schedule == '0 0 1 1 *'}}
        run: |
          current_year=$(date +'%Y')

          echo "current_year: $current_year"

          sed -i "s/default: [0-9]\{4\}/default: $current_year/" copier.yml

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('deps/requirements/prek.txt') }}

      - name: Install prek
        run: |
          python -m pip install --requirement deps/requirements/prek.txt

      - name: Install pylint
        run: |
          python -m pip install --requirement deps/requirements/pylint.txt

      - name: Update pre-commit-config.yaml files
        run: |
          prek autoupdate

      - name: Update jython
        run: |
          pylint --generate-rcfile > .pylintrc
        working-directory: jython

      - name: Update python
        run: |
          pylint --generate-rcfile > .pylintrc
        working-directory: python

      - name: Detect changes
        id: git-diff
        uses: coatl-dev/actions/simple-git-diff@208567f6e604baf94c6e867ec7f345ec9ad36eb4 # v7.0.0

      - name: Import GPG key
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        id: gpg-import
        uses: coatl-dev/actions/gpg-import@208567f6e604baf94c6e867ec7f345ec9ad36eb4 # v7.0.0
        with:
          passphrase: ${{ secrets.COATL_BOT_GPG_PASSPHRASE }}
          private-key: ${{ secrets.COATL_BOT_GPG_PRIVATE_KEY }}

      - name: Commit and push changes
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        run: |
          git checkout -B coatl-dev-autoupdate
          git add --update
          git commit -m 'refactor(templates): autoupdate'
          git push --force --set-upstream origin coatl-dev-autoupdate

      - name: Create Pull Request
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        uses: coatl-dev/actions/pr-create@208567f6e604baf94c6e867ec7f345ec9ad36eb4 # v7.0.0
        with:
          gh-token: ${{ secrets.COATL_BOT_GH_TOKEN }}
